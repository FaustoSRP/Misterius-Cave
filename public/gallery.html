<!DOCTYPE html>
<html>

<head>
    <title>Image Gallery - All Temp Files (History + New)</title>
    <style>
        body {
            background: #111;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
            justify-content: center;
        }

        .card {
            border: 1px solid #333;
            background: #1a1a1a;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            width: 320px;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin-bottom: 15px;
            border-radius: 4px;
        }

        p {
            margin: 5px 0;
            font-size: 0.9rem;
            color: #aaa;
        }

        .filename {
            font-weight: bold;
            color: #eee;
            word-break: break-all;
        }
    </style>
</head>

<body>
    <div id="gallery"></div>

    <script>
        const images = [
            // History (9)
            "media__1771092766615.jpg",
            "media__1771092766616.jpg",
            "media__1771092766642.jpg",
            "media__1771092871790.jpg",
            "media__1771093253186.jpg",
            "media__1771093282965.jpg",
            "media__1771093304550.jpg",
            "media__1771093436810.jpg",
            "media__1771094101460.jpg",
            // New from current conversation (3)
            "media__1771296403213.jpg",
            "media__1771296403224.jpg",
            "media__1771297067369.jpg"
        ];

        const gallery = document.getElementById('gallery');
        gallery.innerHTML = images.map(img => `
            <div class="card">
                <img src="/temp/${img}" alt="${img}" />
                <p class="filename">${img}</p>
            </div>
        `).join('');
    </script>
</body>

</html>
